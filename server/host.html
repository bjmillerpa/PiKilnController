<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relay Host</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 20px; }
    h1 { color: #e94560; margin-bottom: 16px; }
    .status { padding: 8px 14px; border-radius: 6px; display: inline-block; margin-bottom: 16px; font-weight: 600; }
    .status.connected { background: #16213e; color: #0f0; border: 1px solid #0f0; }
    .status.disconnected { background: #16213e; color: #f44; border: 1px solid #f44; }
    label { display: block; font-weight: 600; margin-bottom: 4px; color: #a0a0c0; }
    input, textarea { width: 100%; padding: 10px; border: 1px solid #333; border-radius: 6px; background: #16213e; color: #e0e0e0; font-family: monospace; font-size: 14px; }
    input:focus, textarea:focus { outline: none; border-color: #e94560; }
    textarea { height: 260px; resize: vertical; }
    .row { display: flex; gap: 16px; margin-bottom: 12px; align-items: end; }
    .row > div { flex: 1; }
    button { padding: 10px 24px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 14px; }
    button.primary { background: #e94560; color: #fff; }
    button.primary:hover { background: #c73650; }
    button.primary:disabled { background: #555; cursor: not-allowed; }
    button.secondary { background: #16213e; color: #e0e0e0; border: 1px solid #444; }
    button.secondary:hover { background: #1a2a4e; }
    .actions { display: flex; gap: 10px; margin-bottom: 16px; }
    #log { background: #0f0f23; border: 1px solid #333; border-radius: 6px; padding: 12px; height: 180px; overflow-y: auto; font-family: monospace; font-size: 13px; white-space: pre-wrap; }
    .log-entry { margin-bottom: 2px; }
    .log-entry.error { color: #f44; }
    .log-entry.success { color: #0f0; }
    .log-entry.info { color: #88f; }
    .file-drop { border: 2px dashed #444; border-radius: 6px; padding: 20px; text-align: center; color: #888; margin-bottom: 12px; transition: border-color 0.2s; }
    .file-drop.dragover { border-color: #e94560; color: #e94560; }
  </style>
</head>
<body>
  <h1>Host Client</h1>
  <div id="statusBadge" class="status disconnected">Disconnected</div>

  <div class="row">
    <div>
      <label for="serverUrl">Server URL</label>
      <input id="serverUrl" value="ws://localhost:8080" />
    </div>
    <div>
      <label for="channel">Channel</label>
      <input id="channel" value="default" />
    </div>
  </div>

  <div class="actions">
    <button id="connectBtn" class="primary" onclick="toggleConnection()">Connect</button>
  </div>

  <div class="file-drop" id="fileDrop">
    Drop a JSON file here, or click to select
    <input type="file" id="fileInput" accept=".json" style="display:none" />
  </div>

  <label for="editor">JSON Payload</label>
  <textarea id="editor" placeholder='{ "key": "value" }'></textarea>

  <div class="actions" style="margin-top: 12px;">
    <button class="primary" id="sendBtn" onclick="publish()" disabled>Publish</button>
    <button class="secondary" onclick="formatJson()">Format JSON</button>
  </div>

  <label style="margin-top: 16px;">Log</label>
  <div id="log"></div>

  <script>
    let ws = null;
    const editor = document.getElementById('editor');
    const logEl = document.getElementById('log');
    const statusBadge = document.getElementById('statusBadge');
    const connectBtn = document.getElementById('connectBtn');
    const sendBtn = document.getElementById('sendBtn');
    const fileDrop = document.getElementById('fileDrop');
    const fileInput = document.getElementById('fileInput');

    function log(msg, cls = '') {
      const ts = new Date().toLocaleTimeString();
      const div = document.createElement('div');
      div.className = 'log-entry ' + cls;
      div.textContent = `[${ts}] ${msg}`;
      logEl.appendChild(div);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function setConnected(connected) {
      if (connected) {
        statusBadge.textContent = 'Connected as Host';
        statusBadge.className = 'status connected';
        connectBtn.textContent = 'Disconnect';
        sendBtn.disabled = false;
      } else {
        statusBadge.textContent = 'Disconnected';
        statusBadge.className = 'status disconnected';
        connectBtn.textContent = 'Connect';
        sendBtn.disabled = true;
      }
    }

    function toggleConnection() {
      if (ws && ws.readyState <= 1) {
        ws.close();
        return;
      }
      const url = document.getElementById('serverUrl').value;
      log(`Connecting to ${url}...`, 'info');
      ws = new WebSocket(url);

      ws.onopen = () => {
        ws.send(JSON.stringify({ type: 'register', role: 'host' }));
      };

      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'registered') {
          log('Registered as host', 'success');
          setConnected(true);
        } else if (msg.type === 'published') {
          log(`Published to "${msg.channel}" — ${msg.viewerCount} viewer(s)`, 'success');
        } else if (msg.error) {
          log(`Error: ${msg.error}`, 'error');
        }
      };

      ws.onclose = () => {
        log('Disconnected', 'error');
        setConnected(false);
        ws = null;
      };

      ws.onerror = () => {
        log('Connection error', 'error');
      };
    }

    function publish() {
      if (!ws || ws.readyState !== 1) {
        log('Not connected', 'error');
        return;
      }
      const channel = document.getElementById('channel').value || 'default';
      let data;
      try {
        data = JSON.parse(editor.value);
      } catch (err) {
        log(`Invalid JSON: ${err.message}`, 'error');
        return;
      }
      ws.send(JSON.stringify({ type: 'publish', channel, data }));
    }

    function formatJson() {
      try {
        const obj = JSON.parse(editor.value);
        editor.value = JSON.stringify(obj, null, 2);
      } catch (err) {
        log(`Cannot format: ${err.message}`, 'error');
      }
    }

    // File drop handling
    fileDrop.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => {
      if (e.target.files.length) loadFile(e.target.files[0]);
    });
    fileDrop.addEventListener('dragover', (e) => {
      e.preventDefault();
      fileDrop.classList.add('dragover');
    });
    fileDrop.addEventListener('dragleave', () => fileDrop.classList.remove('dragover'));
    fileDrop.addEventListener('drop', (e) => {
      e.preventDefault();
      fileDrop.classList.remove('dragover');
      if (e.dataTransfer.files.length) loadFile(e.dataTransfer.files[0]);
    });

    function loadFile(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        editor.value = e.target.result;
        log(`Loaded file: ${file.name} (${file.size} bytes)`, 'info');
      };
      reader.readAsText(file);
    }
  </script>
</body>
</html>
