<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PiKiln Controller</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px;
      max-width: 960px;
      margin: 0 auto;
    }

    /* Header */
    header { margin-bottom: 16px; }
    h1 { color: #e94560; font-size: 1.5em; }
    .header-row { display: flex; justify-content: space-between; align-items: center; margin-top: 2px; }
    .subtitle { color: #888; font-size: 13px; }
    .conn-status {
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
    }
    .conn-status.on { background: #16213e; color: #0f0; border: 1px solid #0f0; }
    .conn-status.off { background: #16213e; color: #f44; border: 1px solid #f44; }

    /* Simulation banner */
    .sim-banner {
      background: #553300;
      color: #ffaa00;
      padding: 6px 14px;
      border-radius: 6px;
      margin-bottom: 12px;
      font-weight: 600;
      font-size: 13px;
      text-align: center;
    }

    /* Temperature rings */
    .temps { display: flex; gap: 12px; margin-bottom: 16px; }
    .temp-ring {
      flex: 1;
      background: #16213e;
      border: 2px solid #333;
      border-radius: 8px;
      padding: 14px 8px;
      text-align: center;
      transition: border-color 0.3s;
    }
    .temp-ring.on { border-color: #e94560; box-shadow: 0 0 12px rgba(233,69,96,0.3); }
    .temp-ring .label { font-size: 11px; color: #888; text-transform: uppercase; }
    .temp-ring .value { font-size: 2em; font-weight: 700; margin: 4px 0; }
    .element-indicator { font-size: 11px; color: #e94560; font-weight: 600; min-height: 16px; }

    /* Info grid */
    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }
    .info-card {
      background: #16213e;
      border-radius: 6px;
      padding: 10px 12px;
    }
    .info-card .label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
    .info-card .value { font-size: 1.15em; font-weight: 600; margin-top: 2px; }
    .mode-running { color: #28a745; }
    .mode-finished { color: #ffaa00; }
    .mode-off { color: #888; }

    /* Sections */
    .section { margin-bottom: 16px; }
    .section-title {
      font-weight: 600;
      color: #a0a0c0;
      font-size: 13px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Chart */
    .chart-container { background: #16213e; border-radius: 6px; padding: 8px; min-height: 100px; }
    .chart-placeholder { color: #555; text-align: center; padding: 40px; font-size: 13px; }

    /* Two column layout */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    @media (max-width: 640px) { .two-col { grid-template-columns: 1fr; } }

    /* Schedule picker */
    .picker { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
    .picker select {
      flex: 1;
      min-width: 160px;
      padding: 8px;
      border-radius: 6px;
      background: #16213e;
      color: #e0e0e0;
      border: 1px solid #444;
      font-size: 13px;
    }

    /* Buttons */
    button {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      transition: background 0.2s;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-start { background: #28a745; color: #fff; }
    .btn-start:hover:not(:disabled) { background: #218838; }
    .btn-stop { background: #e94560; color: #fff; }
    .btn-stop:hover:not(:disabled) { background: #c73650; }
    .btn-secondary { background: #16213e; color: #e0e0e0; border: 1px solid #444; }
    .btn-secondary:hover:not(:disabled) { background: #1a2a4e; }
    .btn-secondary.active { border-color: #e94560; color: #e94560; }
    .btn-small { padding: 5px 10px; font-size: 12px; }
    .btn-danger { background: #a00; color: #fff; }

    /* Controls */
    .control-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
    .control-label { font-size: 12px; color: #888; min-width: 36px; }

    /* Segment table */
    .segment-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .segment-table th {
      text-align: left;
      padding: 6px 8px;
      color: #888;
      font-size: 11px;
      text-transform: uppercase;
      border-bottom: 1px solid #333;
    }
    .segment-table td {
      padding: 6px 8px;
      border-bottom: 1px solid #222;
    }
    .segment-table input[type="number"] {
      width: 70px;
      padding: 4px;
      background: #0f0f23;
      color: #e0e0e0;
      border: 1px solid #444;
      border-radius: 4px;
      font-size: 13px;
    }
    .segment-table input[type="text"] {
      padding: 4px;
      background: #0f0f23;
      color: #e0e0e0;
      border: 1px solid #444;
      border-radius: 4px;
      font-size: 13px;
    }
    .edit-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }
    .edit-row label { font-size: 12px; color: #888; }
    .edit-row input {
      flex: 1;
      padding: 6px 8px;
      background: #0f0f23;
      color: #e0e0e0;
      border: 1px solid #444;
      border-radius: 4px;
      font-size: 13px;
    }
    .edit-actions { display: flex; gap: 8px; margin-top: 8px; }

    /* Log */
    .log-container {
      background: #0f0f23;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 10px;
      height: 200px;
      overflow-y: auto;
      font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
      font-size: 11px;
      white-space: pre-wrap;
    }
    .log-entry { margin-bottom: 1px; line-height: 1.4; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="app.js"></script>
</body>
</html>
